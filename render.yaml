services:
  - type: web
    name: vernen-api
    runtime: node
    buildCommand: npm install
    startCommand: node src/api/server.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: PORT
        value: 3001
    healthCheckPath: /health
    autoDeploy: true
