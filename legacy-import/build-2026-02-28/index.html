<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="VERNEN™ — Multilingual Legal Compliance Platform for California Judicial Council forms" />
  <meta name="author" content="Michael Vernen Thomas Hartmann" />
  <meta name="robots" content="noindex, nofollow" />
  <title>VERNEN™ — Multilingual Legal Compliance Platform</title>

  <!-- Preload critical fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <style>
    /* Critical CSS — prevents FOUC */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8f9fb; color: #1a1a1a; line-height: 1.5;
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    }
    #root { min-height: 100vh; }

    /* Loading screen */
    .vernen-loader {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100vh; gap: 20px;
    }
    .vernen-loader-logo {
      font-size: 32px; font-weight: 700; color: #1a3a5c;
      letter-spacing: -0.5px;
    }
    .vernen-loader-bar {
      width: 200px; height: 3px; background: #e5e7eb;
      border-radius: 2px; overflow: hidden;
    }
    .vernen-loader-bar::after {
      content: ''; display: block; width: 40%; height: 100%;
      background: #1a3a5c; border-radius: 2px;
      animation: vernen-load 1.2s ease-in-out infinite;
    }
    @keyframes vernen-load {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .vernen-loader-bar::after { animation: none; width: 100%; opacity: 0.5; }
    }
  </style>
</head>
<body>
  <div id="root">
    <!-- Pre-React loading screen -->
    <div class="vernen-loader">
      <div class="vernen-loader-logo">VERNEN™</div>
      <div class="vernen-loader-bar"></div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
